name: Daily Activity Commit

on:
  schedule:
    - cron: '30 7 * * *'   # 1:00 PM IST daily
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git
        run: |
          git config user.email "mayur0608@users.noreply.github.com"
          git config user.name "mayur0608"

      - name: Daily commit
        run: python auto_commit_agent.py --single

      - run: git push
