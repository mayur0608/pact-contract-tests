name: Pact Contract Tests CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '30 7 * * *'   # Daily at 1 PM IST
  workflow_dispatch:

jobs:
  consumer:
    name: Consumer Pact Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run consumer tests (generates pact files)
        run: mvn test -pl consumer -Dpact.rootDir=${{ github.workspace }}/pacts

      - name: Upload pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-files
          path: pacts/

  provider:
    name: Provider Pact Verification
    runs-on: ubuntu-latest
    needs: consumer
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Download pact files
        uses: actions/download-artifact@v4
        with:
          name: pact-files
          path: pacts/

      - name: Verify provider against pacts
        run: mvn test -pl provider -Dpact.rootDir=${{ github.workspace }}/pacts
